version: '3.8'

# Survivability test overlay for docker-compose
# Usage: docker compose -f docker-compose.yml -f docker-compose.survivability.yml up -d

services:
  survivability-tests:
    build:
      context: ../services/survivability_tests
      dockerfile: Dockerfile
    environment:
      - CORE_URL=http://core:3000
      - SARATHI_URL=http://sarathi:3001
      - BRIDGE_URL=http://bridge:3002
      - EXECUTION_URL=http://execution:3003
      - BUCKET_URL=http://bucket:3004
    depends_on:
      - core
      - sarathi
      - bridge
      - execution
      - bucket
    networks:
      - tantra-network
    volumes:
      - ../services/replay_persistence/data:/app/data:ro
      - ../services/survivability_tests/proof:/app/proof
    profiles:
      - survivability
      - test
